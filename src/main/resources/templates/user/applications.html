<!DOCTYPE html>
<html  
    lang="en" 
    xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security"  >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Applications</title>
</head>
<body>
    <h1>Applications</h1>
    <hr>
    <table>
        <tr>
            <th>Job Title</th>
            <th>Experence Required</th>
            <th>Salary</th>
            <th>score</th>
            <th>resume url</th>
            <th>Actions</th>
        </tr>
        <tr th:each="item : ${userApplications}">
            <td>
                [[${item.jobTitle}]]
            </td>
            <td>
                [[${item.jobExperience}]]
            </td>
            <td>
                [[${item.jobSalary}]]
            </td>
            <td>
                [[${item.score}]]
            </td>
            <td>
                <a th:href="@{${item.resumeUrl}}">view resume</a>
            </td>
            <td>
                <a th:href="@{/user/application/delete/}+${item.applicationId}" sec:authorize="hasAuthority('USERx')">delete application</a>
            </td>
            
        </tr>
    </table>
</body>
</html>
